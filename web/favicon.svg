  <rect x="13" y="15" width="6" height="8" fill="#000"/>
  <rect x="11" y="17" width="2" height="4" fill="#000"/>
  <rect x="19" y="17" width="2" height="4" fill="#000"/>
  <!-- Fart cloud -->
  <g class="fart">
    <ellipse cx="16" cy="26" rx="4" ry="2" fill="#90EE90" opacity="0.8"/>
    <ellipse cx="18" cy="24" rx="3" ry="1.5" fill="#98FB98" opacity="0.6"/>
    <ellipse cx="14" cy="25" rx="2.5" ry="1" fill="#ADFF2F" opacity="0.7"/>
  </g>
</svg></content>
