<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Fart Flirter Analyzer">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Fart Flirter">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="alternate icon" type="image/png" href="favicon.png"/>

  <title>Fart Flirter Analyzer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0A0A0F;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    /* Splash Screen Styles */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #FFFF00, #FFD700);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      animation: backgroundPulse 2s ease-in-out infinite;
    }

    @keyframes backgroundPulse {
      0%, 100% { background: linear-gradient(135deg, #FFFF00, #FFD700); }
      50% { background: linear-gradient(135deg, #FFD700, #FFFF00); }
    }

    .splash-content {
      text-align: center;
      animation: fadeInUp 1.5s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fart-icon {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-10px);
      }
      60% {
        transform: translateY(-5px);
      }
    }

    .app-title {
      font-size: 2.5rem;
      font-weight: bold;
      color: #000;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      animation: textGlow 2s ease-in-out infinite alternate;
    }

    @keyframes textGlow {
      from { text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
      to { text-shadow: 2px 2px 8px rgba(0,0,0,0.6), 0 0 20px rgba(255,215,0,0.5); }
    }

    .tagline {
      font-size: 1.2rem;
      color: #333;
      font-weight: 500;
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .loading-bar {
      width: 200px;
      height: 4px;
      background: rgba(0,0,0,0.2);
      border-radius: 2px;
      margin-top: 30px;
      overflow: hidden;
    }

    .loading-progress {
      height: 100%;
      background: #000;
      border-radius: 2px;
      animation: loading 3s ease-in-out;
    }

    @keyframes loading {
      0% { width: 0%; }
      70% { width: 90%; }
      100% { width: 100%; }
    }

    #splash-screen.hide {
      animation: fadeOut 0.5s ease-out forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-content">
      <div class="fart-icon">
        <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <style>
              @keyframes cloudFloat {
                0%, 100% { transform: translateY(0px) scale(1); }
                50% { transform: translateY(-3px) scale(1.05); }
              }
              .cloud {
                animation: cloudFloat 3s ease-in-out infinite;
              }
            </style>
          </defs>
          <!-- Person silhouette -->
          <circle cx="60" cy="35" r="8" fill="#000"/>
          <rect x="52" y="43" width="16" height="20" fill="#000"/>
          <rect x="48" y="48" width="4" height="10" fill="#000"/>
          <rect x="68" y="48" width="4" height="10" fill="#000"/>
          <!-- Fart clouds -->
          <g class="cloud">
            <ellipse cx="60" cy="75" rx="12" ry="6" fill="#90EE90" opacity="0.9"/>
            <ellipse cx="68" cy="70" rx="8" ry="4" fill="#98FB98" opacity="0.7"/>
            <ellipse cx="52" cy="72" rx="6" ry="3" fill="#ADFF2F" opacity="0.8"/>
            <ellipse cx="64" cy="80" rx="10" ry="5" fill="#FFFFE0" opacity="0.6"/>
          </g>
        </svg>
      </div>
      <h1 class="app-title">Fart Flirter</h1>
      <p class="tagline">The Ultimate Fart Detection Game</p>
      <div class="loading-bar">
        <div class="loading-progress"></div>
      </div>
    </div>
  </div>

  <script>
    // Ensure mic permission policy is set
    if (navigator.permissions) {
      navigator.permissions.query({ name: 'microphone' }).then(function(result) {
        console.log('Mic permission status:', result.state);
      });
    }
  </script>

  <!-- This script installs a service worker to make this a PWA -->
  <script>
    var serviceWorkerVersion = null;
    var scriptLoaded = false;
    function loadMainDartJs() {
      if (scriptLoaded) { return; }
      scriptLoaded = true;

      // Hide splash screen with animation
      setTimeout(function() {
        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('hide');
          setTimeout(function() {
            splash.style.display = 'none';
          }, 500);
        }
      }, 1000); // Wait 1 second after starting to load Flutter

      var scriptTag = document.createElement('script');
      scriptTag.src = 'main.dart.js';
      scriptTag.type = 'application/javascript';
      document.body.append(scriptTag);
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        var serviceWorkerUrl = 'flutter_service_worker.js?v=' + serviceWorkerVersion;
        navigator.serviceWorker.register(serviceWorkerUrl).then(function (reg) {
          function waitForActivation(serviceWorker) {
            serviceWorker.addEventListener('statechange', function () {
              if (serviceWorker.state == 'activated') { loadMainDartJs(); }
            });
          }
          if (!reg.active && (reg.installing || reg.waiting)) {
            waitForActivation(reg.installing ?? reg.waiting);
          } else if (!reg.active.scriptURL.endsWith(serviceWorkerVersion)) {
            reg.update();
            waitForActivation(reg.installing);
          } else { loadMainDartJs(); }
        });
        setTimeout(loadMainDartJs, 4000);
      });
    } else { loadMainDartJs(); }
  </script>
</body>
</html>
