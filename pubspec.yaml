name: fart_flirter
description: Fully offline fart detection and scoring app using on-device ML.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  record: ^5.1.2
  tflite_flutter: ^0.10.4
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  audio_waveforms: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/fart_classifier.tflite
    - assets/models/labels.txt
