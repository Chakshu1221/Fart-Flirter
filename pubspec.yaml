name: fart_flirter
description: Fully offline fart detection and scoring app using on-device ML.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  record: ^5.1.2
  tflite_flutter: ^0.10.4
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  audio_waveforms: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/models/fart_classifier.tflite
    - assets/models/labels.txt

# App icon configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/fart_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/fart_icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

# Splash screen configuration
flutter_native_splash:
  color: "#FFFF00"  # Yellow background
  image: assets/icon/fart_icon.png
  android_12:
    image: assets/icon/fart_icon.png
    color: "#FFFF00"
  web: false  # We'll handle web splash separately
